name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    name: Compilar APK na Forca Bruta
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build do App Principal
        run: ./gradlew :app:assembleStandardDebug --stacktrace

      - name: Upload do APK Final
        uses: actions/upload-artifact@v4
        with:
          name: Nexu5Vault-Custom-APK
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error